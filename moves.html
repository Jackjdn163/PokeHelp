<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Move Database - Every Pokémon move from pokepc/dataset.">
    <title>PokéHelp • Moves</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Space+Grotesk:wght@500;600&amp;display=swap');
        :root { --primary-blue: #00A3FF; }
        body { font-family: 'Inter', system_ui, sans-serif; }
        .logo-font { font-family: 'Space Grotesk', sans-serif; letter-spacing: -2px; }
    </style>
</head>
<body class="bg-[#0F172A] text-slate-100">

    <!-- NAVBAR (identical to the other pages) -->
    <nav class="bg-[#0F172A] border-b border-slate-800 sticky top-0 z-50 backdrop-blur-lg">
        <div class="max-w-7xl mx-auto px-6 py-5">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-9 h-9 bg-[#00A3FF] rounded-2xl flex items-center justify-center shadow-inner">
                        <div class="text-white text-2xl">⚡</div>
                    </div>
                    <h1 onclick="window.location.href='index.html'" class="logo-font text-4xl tracking-[-2px] text-white cursor-pointer">PokéHelp</h1>
                </div>

                <div class="hidden md:flex items-center gap-8 text-sm font-medium">
                    <a href="index.html" class="flex items-center gap-1.5 hover:text-[#00A3FF]"><i class="fas fa-home"></i><span>Home</span></a>
                    <a href="pokedex.html" class="flex items-center gap-1.5 hover:text-[#00A3FF]"><i class="fas fa-book"></i><span>Pokédex</span></a>
                    <a href="moves.html" class="flex items-center gap-1.5 text-[#00A3FF] border-b-2 border-[#00A3FF] pb-1"><i class="fas fa-bolt"></i><span>Moves</span></a>
                    <a href="#" onclick="alert('Abilities page coming soon!')" class="flex items-center gap-1.5 hover:text-[#00A3FF]"><i class="fas fa-shield-alt"></i><span>Abilities</span></a>
                    <a href="#" onclick="alert('Items page coming soon!')" class="flex items-center gap-1.5 hover:text-[#00A3FF]"><i class="fas fa-gem"></i><span>Items</span></a>
                    <a href="#" onclick="alert('Type Chart coming soon!')" class="flex items-center gap-1.5 hover:text-[#00A3FF]"><i class="fas fa-circle"></i><span>Type Chart</span></a>
                </div>

                <div class="flex items-center gap-3">
                    <button onclick="toggleMobileMenu()" class="md:hidden w-11 h-11 flex items-center justify-center text-2xl text-slate-400 hover:text-white rounded-2xl border border-slate-700">
                        <i class="fas fa-bars"></i>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <header class="bg-gradient-to-br from-[#0F172A] to-[#1E2937] py-12 border-b border-slate-700">
        <div class="max-w-7xl mx-auto px-6 text-center">
            <h1 class="text-5xl font-semibold tracking-tighter logo-font">Move Database</h1>
            <p class="text-slate-400 mt-2">900+ moves • Real data from pokepc/dataset</p>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-10">
        <input id="move-search" type="text" placeholder="Search any move..." 
               class="w-full bg-slate-900 border border-slate-700 focus:border-[#00A3FF] rounded-3xl px-6 py-5 text-lg mb-8">

        <div id="moves-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </main>

    <script>
        let allMoves = [];

        async function loadMoves() {
            try {
                const res = await fetch('https://raw.githubusercontent.com/pokepc/dataset/main/data/moves.json');
                allMoves = await res.json();
                renderMoves(allMoves);
            } catch (e) {
                document.getElementById('moves-grid').innerHTML = `<p class="text-red-400 text-center py-12">Could not load moves.</p>`;
            }
        }

        function renderMoves(moves) {
            const grid = document.getElementById('moves-grid');
            grid.innerHTML = '';
            moves.forEach(move => {
                const card = document.createElement('div');
                card.className = "bg-slate-900 border border-slate-700 rounded-3xl p-6 hover:border-[#00A3FF]";
                card.innerHTML = `
                    <div class="flex justify-between">
                        <h3 class="text-2xl font-semibold">${move.name}</h3>
                        <span class="px-3 py-1 text-xs font-medium rounded-full" style="background-color: ${typeColors[move.type] || '#777'}">${move.type.toUpperCase()}</span>
                    </div>
                    <p class="text-slate-400 mt-1">${move.category} • Power: ${move.power || '—'} • Acc: ${move.accuracy || '—'}</p>
                    <p class="mt-4 text-slate-300">${move.shortDesc || move.desc || 'No description available.'}</p>
                `;
                grid.appendChild(card);
            });
        }

        document.getElementById('move-search').addEventListener('input', (e) => {
            const filtered = allMoves.filter(m => m.name.toLowerCase().includes(e.target.value.toLowerCase()));
            renderMoves(filtered);
        });

        const typeColors = { normal: '#A8A878', fire: '#F08030', water: '#6890F0', grass: '#78C850', electric: '#F8D030', ice: '#98D8D8', fighting: '#C03028', poison: '#A040A0', ground: '#E0C068', flying: '#A890F0', psychic: '#F85888', bug: '#A8B820', rock: '#B8A038', ghost: '#705898', dragon: '#7038F8', dark: '#705848', steel: '#B8B8D0', fairy: '#EE99AC' };

        window.onload = loadMoves;
    </script>
</body>
</html>
