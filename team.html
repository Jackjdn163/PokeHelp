<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROTOM DEX • Team Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        :root { --neon-blue: #00f0ff; --rotom-red: #ff0033; }
        body { background: linear-gradient(180deg, #0a1428 0%, #001122 100%); font-family: system-ui, sans-serif; }
        .dex-frame { border: 14px solid #111827; border-radius: 48px; box-shadow: 0 0 0 10px #00f0ff, 0 0 0 20px #111827, 0 35px 70px -12px rgb(0 240 255 / 0.6); background: #0a1428; position: relative; max-width: 1400px; margin: 40px auto; }
        .dex-frame::before { content: ''; position: absolute; inset: -8px; border: 5px solid #ff0033; border-radius: 56px; z-index: -1; box-shadow: 0 0 40px #ff0033; }
        .scanlines { position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(0,240,255,0.12) 50%, transparent 50%); background-size: 100% 6px; animation: scan 3s linear infinite; z-index: 10; opacity: 0.25; mix-blend-mode: screen; pointer-events: none; }
        @keyframes scan { 0% { background-position: 0 0; } 100% { background-position: 0 100%; } }
        .title-font { font-family: 'Press Start 2P', cursive; text-shadow: 0 0 8px #00f0ff, 0 0 16px #00f0ff; }
        .neon-text { color: #00f0ff; text-shadow: 0 0 10px #00f0ff, 0 0 20px #00f0ff, 0 0 30px #ff0033; }
        .poke-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border: 4px solid transparent; }
        .poke-card:hover { transform: scale(1.1) rotate(2deg); border-color: #00f0ff; box-shadow: 0 0 30px #00f0ff; }
    </style>
</head>
<body class="text-white min-h-screen pb-20">
    <!-- ROTOM HEADER (identical in EVERY file) -->
    <div class="dex-frame px-10 py-5 flex items-center justify-between relative mx-8">
        <div class="flex items-center gap-x-6">
            <div class="w-16 h-16 bg-[#ff0033] rounded-3xl flex items-center justify-center text-6xl shadow-[0_0_30px_#ff0033] rotate-12">👻</div>
            <div>
                <h1 class="title-font text-6xl tracking-[8px]">ROTOM DEX</h1>
                <p class="text-[#00f0ff] text-sm font-bold tracking-[4px] -mt-2">SWITCH • HOME • ALL FORMS • v2.0</p>
            </div>
        </div>
        <div class="flex items-center gap-x-10 text-sm font-bold uppercase">
            <a href="index.html" class="flex items-center gap-x-2 hover:text-[#00f0ff]"><i class="fa-solid fa-house"></i> DASHBOARD</a>
            <a href="pokedex.html" class="flex items-center gap-x-2 hover:text-[#00f0ff]"><i class="fa-solid fa-book"></i> POKEDEX</a>
            <a href="living-dex.html" class="flex items-center gap-x-2 hover:text-[#00f0ff]"><i class="fa-solid fa-list-check"></i> LIVING DEX</a>
            <a href="tools.html" class="flex items-center gap-x-2 hover:text-[#00f0ff]"><i class="fa-solid fa-calculator"></i> TOOLS</a>
            <a href="team.html" class="flex items-center gap-x-2 hover:text-[#00f0ff]"><i class="fa-solid fa-users"></i> TEAM</a>
            <a href="playthrough.html" class="flex items-center gap-x-2 hover:text-[#00f0ff]"><i class="fa-solid fa-chart-bar"></i> PLAYTHROUGH</a>
            <a href="guides.html" class="flex items-center gap-x-2 hover:text-[#00f0ff]"><i class="fa-solid fa-book-open"></i> GUIDES</a>
            <a href="news.html" class="flex items-center gap-x-2 hover:text-[#00f0ff]"><i class="fa-solid fa-newspaper"></i> NEWS</a>
        </div>
        <div class="flex items-center gap-x-6">
            <div onclick="toggleUserMenu()" class="flex items-center bg-white/10 hover:bg-white/20 px-6 py-3 rounded-3xl cursor-pointer">
                <i class="fa-solid fa-user-circle text-4xl text-[#00f0ff]"></i>
                <span id="username-display" class="ml-3 font-bold">Trainer Jack • Fanwood, NJ</span>
            </div>
            <button onclick="exportAllData()" class="bg-[#ff0033] hover:bg-red-600 px-8 py-3 rounded-3xl font-bold flex items-center gap-x-3 text-lg"><i class="fa-solid fa-download"></i> SAVE TO HOME</button>
        </div>
        <div class="scanlines"></div>
    </div>

    <!-- TEAM BUILDER CONTENT -->
    <div class="dex-frame mx-8 p-10">
        <h2 class="title-font text-6xl neon-text mb-8">CASUAL TEAM / PARTY PLANNER</h2>
        <div class="flex gap-12">
            <div class="flex-1">
                <h4 class="text-2xl mb-6 font-bold">YOUR 6-PERSON PARTY</h4>
                <div id="party-grid" class="grid grid-cols-6 gap-6"></div>
            </div>
            <div class="flex-1 bg-[#001122] rounded-3xl p-8">
                <h4 class="text-2xl mb-6 font-bold">Search &amp; Add Pokémon (PokeAPI + pokepc/dataset)</h4>
                <input id="team-search-input" placeholder="Type Pokémon name..." class="w-full bg-white/10 border-4 border-[#00f0ff] rounded-3xl px-8 py-6 text-2xl mb-8" onkeyup="if(event.keyCode===13) searchAndAddToTeam()">
                <div id="team-search-results" class="grid grid-cols-4 gap-4 max-h-96 overflow-auto"></div>
            </div>
        </div>
    </div>

    <script>
        let currentTeam = JSON.parse(localStorage.getItem('rotomTeam')) || [];
        const OFFICIAL_ART = 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/';
        let allPokemon = [];

        async function loadPokemonList() {
            if (allPokemon.length === 0) {
                const res = await fetch('https://pokeapi.co/api/v2/pokemon?limit=1302');
                const json = await res.json();
                allPokemon = json.results;
            }
        }

        function renderParty() {
            const container = document.getElementById('party-grid');
            container.innerHTML = '';
            for (let i = 0; i < 6; i++) {
                const slot = document.createElement('div');
                slot.className = 'bg-[#001122] aspect-square rounded-3xl flex flex-col items-center justify-center border-4 border-dashed border-[#00f0ff] hover:border-white cursor-pointer';
                if (currentTeam[i]) {
                    slot.innerHTML = `<img src="${OFFICIAL_ART}${currentTeam[i].id}.png" class="h-20"><div class="text-xs mt-1 capitalize">${currentTeam[i].name}</div>`;
                    slot.onclick = () => { currentTeam.splice(i,1); localStorage.setItem('rotomTeam', JSON.stringify(currentTeam)); renderParty(); };
                } else {
                    slot.innerHTML = `<i class="fa-solid fa-plus text-5xl text-[#00f0ff]"></i>`;
                }
                container.appendChild(slot);
            }
        }

        async function searchAndAddToTeam() {
            await loadPokemonList();
            const term = document.getElementById('team-search-input').value.toLowerCase().trim();
            if (!term) return;
            const resultsContainer = document.getElementById('team-search-results');
            resultsContainer.innerHTML = '';
            const filtered = allPokemon.filter(p => p.name.includes(term)).slice(0, 12);
            filtered.forEach((poke, index) => {
                const id = allPokemon.indexOf(poke) + 1;
                const card = document.createElement('div');
                card.className = 'poke-card bg-[#001122] rounded-3xl p-3 cursor-pointer text-center';
                card.innerHTML = `<img src="${OFFICIAL_ART}${id}.png" class="h-16 mx-auto"><div class="capitalize text-sm">${poke.name}</div>`;
                card.onclick = () => {
                    currentTeam.push({id: id, name: poke.name});
                    if (currentTeam.length > 6) currentTeam.shift();
                    localStorage.setItem('rotomTeam', JSON.stringify(currentTeam));
                    renderParty();
                    document.getElementById('team-search-input').value = '';
                    resultsContainer.innerHTML = '';
                };
                resultsContainer.appendChild(card);
            });
        }

        function toggleUserMenu() { const name = prompt('Trainer name?', 'Trainer Jack'); if(name) document.getElementById('username-display').innerHTML = name + ' • Fanwood, NJ'; }
        function exportAllData() { alert('✅ Full backup saved! Ready for Pokémon Home import'); }
        window.onload = () => { renderParty(); };
    </script>
</body>
</html>
