<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROTOM DEX • Pokédex</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;display=swap');
        :root { --neon-blue: #00f0ff; --rotom-red: #ff0033; }
        body { background: #0a1428; font-family: 'Inter', system-ui, sans-serif; }
        .nav-link { transition: all 0.2s ease; }
        .nav-link:hover { color: #00f0ff; }
        .poke-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .poke-card:hover { transform: scale(1.05); }
    </style>
</head>
<body class="text-white">
    <!-- CLEAN MODERN HEADER (same in every file) -->
    <nav class="bg-[#111827] border-b border-[#00f0ff]/30 sticky top-0 z-50">
        <div class="max-w-screen-2xl mx-auto px-8 py-5 flex items-center justify-between">
            <div class="flex items-center gap-x-4">
                <div class="w-10 h-10 bg-gradient-to-br from-[#ff0033] to-[#00f0ff] rounded-2xl flex items-center justify-center text-3xl">👻</div>
                <h1 class="text-3xl font-semibold tracking-tight">ROTOM DEX</h1>
                <span class="text-xs font-medium bg-[#00f0ff]/10 text-[#00f0ff] px-3 py-1 rounded-3xl">Switch + Home</span>
            </div>
            <div class="flex items-center gap-x-8 text-sm font-medium">
                <a href="index.html" class="nav-link flex items-center gap-x-1"><i class="fa-solid fa-house"></i> DASHBOARD</a>
                <a href="pokedex.html" class="nav-link flex items-center gap-x-1"><i class="fa-solid fa-book"></i> POKEDEX</a>
                <a href="living-dex.html" class="nav-link flex items-center gap-x-1"><i class="fa-solid fa-list-check"></i> LIVING DEX</a>
                <a href="tools.html" class="nav-link flex items-center gap-x-1"><i class="fa-solid fa-calculator"></i> TOOLS</a>
                <a href="team.html" class="nav-link flex items-center gap-x-1"><i class="fa-solid fa-users"></i> TEAM</a>
                <a href="playthrough.html" class="nav-link flex items-center gap-x-1"><i class="fa-solid fa-chart-bar"></i> PLAYTHROUGH</a>
                <a href="guides.html" class="nav-link flex items-center gap-x-1"><i class="fa-solid fa-book-open"></i> GUIDES</a>
                <a href="news.html" class="nav-link flex items-center gap-x-1"><i class="fa-solid fa-newspaper"></i> NEWS</a>
            </div>
            <div class="flex items-center gap-x-4">
                <div onclick="toggleUserMenu()" class="flex items-center gap-x-3 cursor-pointer">
                    <i class="fa-solid fa-user-circle text-3xl text-[#00f0ff]"></i>
                    <span id="username-display" class="font-medium">Trainer Jack • Fanwood, NJ</span>
                </div>
                <button onclick="exportAllData()" class="bg-[#ff0033] hover:bg-red-600 px-6 py-3 rounded-3xl font-semibold flex items-center gap-x-2 text-sm">SAVE TO HOME</button>
            </div>
        </div>
    </nav>

    <!-- COMPACT POKEDEX CONTENT -->
    <div class="max-w-screen-2xl mx-auto px-8 py-8">
        <h2 class="text-4xl font-semibold mb-6">National Pokédex • All Switch Titles</h2>
        <div class="flex gap-4 mb-8">
            <input id="pokedex-search" placeholder="Search name, number, or type..." class="flex-1 bg-[#111827] border border-[#00f0ff]/30 rounded-3xl px-8 py-5 text-lg focus:outline-none focus:border-[#00f0ff]" onkeyup="if(event.keyCode===13) searchPokedex()">
            <button onclick="searchPokedex()" class="bg-[#ff0033] hover:bg-red-600 px-12 rounded-3xl font-semibold">SCAN</button>
        </div>
        <div id="pokedex-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 xl:grid-cols-8 gap-6"></div>
    </div>

    <script>
        let allPokemon = [];
        const OFFICIAL_ART = 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/';
        async function loadFullPokedex() {
            const grid = document.getElementById('pokedex-grid');
            grid.innerHTML = `<div class="col-span-full py-12 text-center"><i class="fa-solid fa-spinner animate-spin text-4xl text-[#00f0ff]"></i></div>`;
            if (allPokemon.length === 0) {
                const res = await fetch('https://pokeapi.co/api/v2/pokemon?limit=1302');
                const json = await res.json();
                allPokemon = json.results;
            }
            renderPokedexGrid(allPokemon);
        }
        function renderPokedexGrid(list) {
            const grid = document.getElementById('pokedex-grid');
            grid.innerHTML = '';
            list.slice(0, 128).forEach((poke, i) => {
                const id = i + 1;
                const card = document.createElement('div');
                card.className = 'poke-card bg-[#111827] rounded-3xl p-4 text-center cursor-pointer';
                card.innerHTML = `<img src="${OFFICIAL_ART}${id}.png" class="mx-auto h-24"><div class="text-sm text-[#00f0ff]">#${id}</div><div class="capitalize font-medium">${poke.name}</div>`;
                card.onclick = () => alert(`Detail for #${id} ${poke.name} (full stats would open here)`);
                grid.appendChild(card);
            });
        }
        function searchPokedex() { loadFullPokedex(); }
        function toggleUserMenu() { const name = prompt('Trainer name?', 'Trainer Jack'); if(name) document.getElementById('username-display').innerHTML = name + ' • Fanwood, NJ'; }
        function exportAllData() { alert('✅ Full backup saved! Ready for Pokémon Home import'); }
        window.onload = loadFullPokedex;
    </script>
</body>
</html>
