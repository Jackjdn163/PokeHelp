<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="National Pokédex - Browse every base Pokémon. Powered by pokepc/dataset.">
    <title>PokéHelp • National Pokédex</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Space+Grotesk:wght@500;600&amp;display=swap');
        :root { --primary-blue: #00A3FF; }
        body { font-family: 'Inter', system_ui, sans-serif; }
        .logo-font { font-family: 'Space Grotesk', sans-serif; letter-spacing: -2px; }
        .pokemon-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .pokemon-card:hover { transform: translateY(-4px); border-color: var(--primary-blue); box-shadow: 0 0 0 4px rgba(0, 163, 255, 0.15); }
        .modal { animation: modalPop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
        @keyframes modalPop { 0% { transform: scale(0.95); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .sprite { transition: transform 0.3s ease; }
        .pokemon-card:hover .sprite { transform: scale(1.1); }
    </style>
</head>
<body class="bg-[#0F172A] text-slate-100">

    <!-- NAVBAR -->
    <nav class="bg-[#0F172A] border-b border-slate-800 sticky top-0 z-50 backdrop-blur-lg">
        <div class="max-w-7xl mx-auto px-6 py-5">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-9 h-9 bg-[#00A3FF] rounded-2xl flex items-center justify-center shadow-inner">
                        <div class="text-white text-2xl">⚡</div>
                    </div>
                    <h1 onclick="window.location.href='index.html'" class="logo-font text-4xl tracking-[-2px] text-white cursor-pointer">PokéHelp</h1>
                </div>

                <div class="hidden md:flex items-center gap-8 text-sm font-medium">
                    <a href="index.html" class="flex items-center gap-1.5"><i class="fas fa-home text-[#00A3FF]"></i><span>Home</span></a>
                    <a href="pokedex.html" class="flex items-center gap-1.5 text-[#00A3FF] border-b-2 border-[#00A3FF] pb-1"><i class="fas fa-book"></i><span>Pokédex</span></a>
                    <a href="#" onclick="alert('Moves page coming soon!')" class="flex items-center gap-1.5">Moves</a>
                    <a href="#" onclick="alert('Abilities page coming soon!')" class="flex items-center gap-1.5">Abilities</a>
                    <a href="#" onclick="alert('Items page coming soon!')" class="flex items-center gap-1.5">Items</a>
                    <a href="#" onclick="alert('Type Chart coming soon!')" class="flex items-center gap-1.5">Type Chart</a>
                </div>

                <div class="flex items-center gap-3">
                    <select id="gen-filter" class="bg-slate-900 border border-slate-700 text-sm rounded-2xl px-5 py-3 focus:outline-none focus:border-[#00A3FF]">
                        <option value="all">All Generations</option>
                        <option value="1">Gen 1 • Kanto</option>
                        <option value="2">Gen 2 • Johto</option>
                        <option value="3">Gen 3 • Hoenn</option>
                        <option value="4">Gen 4 • Sinnoh</option>
                        <option value="5">Gen 5 • Unova</option>
                        <option value="6">Gen 6 • Kalos</option>
                        <option value="7">Gen 7 • Alola</option>
                        <option value="8">Gen 8 • Galar</option>
                        <option value="9">Gen 9 • Paldea</option>
                    </select>
                    <button onclick="toggleMobileMenu()" class="md:hidden w-11 h-11 flex items-center justify-center text-2xl text-slate-400 hover:text-white rounded-2xl border border-slate-700"><i class="fas fa-bars"></i></button>
                </div>
            </div>
        </div>
    </nav>

    <!-- HEADER -->
    <header class="bg-gradient-to-br from-[#0F172A] to-[#1E2937] py-12 border-b border-slate-700">
        <div class="max-w-7xl mx-auto px-6">
            <div class="flex flex-col md:flex-row md:items-end justify-between gap-6">
                <div>
                    <div class="inline-flex items-center gap-2 bg-white/10 text-white px-4 py-1 rounded-3xl text-sm font-medium mb-3">
                        <i class="fas fa-book-open"></i> NATIONAL POKÉDEX
                    </div>
                    <h1 class="text-5xl md:text-6xl font-semibold tracking-tighter logo-font">1,025 Pokémon</h1>
                    <p class="text-slate-400 text-lg mt-2">Base forms only • Real data from pokepc/dataset</p>
                </div>
                <div class="relative w-full max-w-lg">
                    <input id="pokedex-search" type="text" placeholder="Search by name or number..." 
                           onkeyup="if(event.key === 'Enter') filterPokedex()" 
                           class="w-full bg-slate-900 border border-slate-700 focus:border-[#00A3FF] rounded-3xl px-6 py-5 pl-14 text-lg placeholder:text-slate-400 focus:outline-none">
                    <i class="fas fa-search absolute left-6 top-1/2 -translate-y-1/2 text-slate-400 text-xl"></i>
                    <button onclick="filterPokedex()" class="absolute right-3 top-1/2 -translate-y-1/2 bg-[#00A3FF] hover:bg-[#22D3EE] text-slate-950 font-semibold px-8 py-3 rounded-3xl">Search</button>
                </div>
            </div>
        </div>
    </header>

    <!-- MAIN GRID -->
    <main class="max-w-7xl mx-auto px-6 py-10">
        <div id="loading" class="text-center py-20">
            <i class="fas fa-spinner fa-spin text-5xl text-[#00A3FF]"></i>
            <p class="mt-6 text-slate-400 text-lg">Loading all 1,025 base Pokémon...</p>
        </div>
        <div id="pokedex-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-6 hidden"></div>
    </main>

    <!-- FULL DETAIL MODAL -->
    <div id="pokemon-modal" onclick="if(event.target === this) closeModal()" class="hidden fixed inset-0 bg-black/70 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
        <div onclick="event.stopImmediatePropagation()" class="modal bg-slate-900 w-full max-w-2xl rounded-3xl overflow-hidden">
            <div id="modal-content" class="p-8"></div>
            <div class="border-t border-slate-700 px-8 py-5 flex justify-end">
                <button onclick="closeModal()" class="px-8 py-3 bg-slate-800 hover:bg-slate-700 rounded-2xl font-medium">Close</button>
            </div>
        </div>
    </div>

    <script>
        let allBasePokemon = [];

        function cleanName(pid) {
            return pid.split('-').map(word => word.charAt(0).toUpperCase() + word.slice(1)).join(' ');
        }

        async function loadPokedex() {
            const loading = document.getElementById('loading');
            const grid = document.getElementById('pokedex-grid');
            try {
                const res = await fetch('https://raw.githubusercontent.com/pokepc/dataset/main/data/pokedexes/national.json');
                const data = await res.json();
                allBasePokemon = data.entries.filter(e => !e.isForm).sort((a,b) => a.dexNum - b.dexNum);
                loading.classList.add('hidden');
                grid.classList.remove('hidden');
                renderPokedex(allBasePokemon);
            } catch (e) {
                loading.innerHTML = `<p class="text-red-400">Could not load data. Check your internet.</p>`;
            }
        }

        function renderPokedex(list) {
            const grid = document.getElementById('pokedex-grid');
            grid.innerHTML = '';
            list.forEach(p => {
                const card = document.createElement('div');
                card.className = "pokemon-card bg-slate-900 border border-slate-700 rounded-3xl p-4 cursor-pointer group";
                card.innerHTML = `
                    <div class="flex justify-between mb-4">
                        <span class="font-mono text-sm text-slate-400">#${p.dexNum.toString().padStart(4,'0')}</span>
                    </div>
                    <div class="flex justify-center mb-4 h-32">
                        <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${p.dexNum}.png" class="sprite max-h-32 drop-shadow-md">
                    </div>
                    <h3 class="text-center font-semibold text-xl group-hover:text-[#00A3FF]">${cleanName(p.pid)}</h3>
                `;
                card.onclick = () => showPokemonDetail(p.pid, p.dexNum);
                grid.appendChild(card);
            });
        }

        async function showPokemonDetail(pid, dexNum) {
            const modal = document.getElementById('pokemon-modal');
            const content = document.getElementById('modal-content');
            content.innerHTML = `<div class="text-center py-12"><i class="fas fa-spinner fa-spin text-4xl"></i></div>`;
            modal.classList.remove('hidden');
            modal.classList.add('flex');

            try {
                const res = await fetch(`https://raw.githubusercontent.com/pokepc/dataset/main/data/pokemon/${pid}.json`);
                const pokemonData = await res.json();

                let html = `
                <div class="flex justify-center mb-6">
                    <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${dexNum}.png" class="h-48 drop-shadow-2xl">
                </div>
                <h2 class="text-4xl font-semibold text-center">${cleanName(pid)}</h2>
                <p class="text-center text-slate-400 font-mono">#${dexNum.toString().padStart(4,'0')}</p>
                
                <div class="mt-8 grid grid-cols-2 gap-6 text-sm">
                    <div><p class="text-slate-400 mb-1">Height</p><p class="font-medium">${pokemonData.height ? pokemonData.height / 10 : '?'} m</p></div>
                    <div><p class="text-slate-400 mb-1">Weight</p><p class="font-medium">${pokemonData.weight ? pokemonData.weight / 10 : '?'} kg</p></div>
                </div>

                <div class="mt-10 pt-8 border-t border-slate-700">
                    <h4 class="uppercase text-xs tracking-widest text-slate-400 mb-4 flex items-center gap-2">
                        <i class="fas fa-shapes"></i> OTHER FORMS &amp; VARIATIONS
                    </h4>
                    <div id="other-forms" class="grid grid-cols-2 sm:grid-cols-3 gap-4 text-sm"></div>
                </div>`;

                content.innerHTML = html;
                loadOtherForms(dexNum);
            } catch (e) {
                content.innerHTML = `<div class="text-center text-red-400">Could not load full details.</div>`;
            }
        }

        async function loadOtherForms(dexNum) {
            try {
                const res = await fetch('https://raw.githubusercontent.com/pokepc/dataset/main/data/pokedexes/national.json');
                const data = await res.json();
                const others = data.entries.filter(e => e.dexNum === dexNum && e.isForm);
                const container = document.getElementById('other-forms');
                container.innerHTML = others.length ? '' : `<div class="col-span-full text-slate-400 text-center py-6">No alternate forms or Mega/Gigantamax.</div>`;
                others.forEach(form => {
                    container.innerHTML += `
                    <div class="bg-slate-800 hover:bg-slate-700 rounded-2xl p-4 text-center cursor-pointer" onclick="alert('Full details for ${cleanName(form.pid)} coming soon!')">
                        <div class="text-sm font-medium">${cleanName(form.pid)}</div>
                    </div>`;
                });
            } catch (e) {}
        }

        function filterPokedex() {
            const term = document.getElementById('pokedex-search').value.toLowerCase().trim();
            const gen = document.getElementById('gen-filter').value;
            let filtered = allBasePokemon;
            if (term) filtered = filtered.filter(p => cleanName(p.pid).toLowerCase().includes(term) || p.dexNum.toString().includes(term));
            if (gen !== 'all') {
                const ranges = {1:[1,151],2:[152,251],3:[252,386],4:[387,493],5:[494,649],6:[650,721],7:[722,809],8:[810,905],9:[906,1025]};
                const [min, max] = ranges[parseInt(gen)];
                filtered = filtered.filter(p => p.dexNum >= min && p.dexNum <= max);
            }
            renderPokedex(filtered);
        }

        function toggleMobileMenu() { document.getElementById('mobile-menu').classList.toggle('hidden'); }
        function closeModal() {
            const modal = document.getElementById('pokemon-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        window.onload = loadPokedex;
    </script>
</body>
</html>
