<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokéHelper • Full Pokédex</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Space+Grotesk:wght@500;600&amp;display=swap" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Space+Grotesk:wght@500;600&amp;display=swap');
        
        body { font-family: 'Inter', system-ui, sans-serif; }
        .title-font { font-family: 'Space Grotesk', sans-serif; }

        .pokedex-bg { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); }
        
        .pokemon-card {
            transition: all 0.3s cubic-bezier(0.4, 0.0, 0.2, 1);
        }
        .pokemon-card:hover {
            transform: scale(1.05) translateY(-4px);
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.5);
        }

        .form-badge {
            font-size: 10px;
            padding: 1px 6px;
            border-radius: 9999px;
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
        }

        .scanline::after {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(transparent 50%, rgba(16, 185, 129, 0.06) 50%);
            background-size: 100% 6px;
            pointer-events: none;
            animation: scan 6s linear infinite;
        }

        @keyframes scan { 0% { background-position: 0 0; } 100% { background-position: 0 600px; } }
    </style>
</head>
<body class="bg-zinc-950 text-white pokedex-bg min-h-screen">
    <div class="max-w-7xl mx-auto p-6">
        <!-- Header -->
        <div class="flex items-center justify-between mb-8">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 bg-red-500 rounded-3xl flex items-center justify-center text-3xl shadow-xl">⚪</div>
                <div>
                    <h1 class="title-font text-5xl font-bold tracking-tighter">PokéHelper</h1>
                    <p class="text-emerald-400 -mt-1">Full Modern Pokédex • All Forms &amp; Variants</p>
                </div>
            </div>
            
            <div class="flex gap-4">
                <div class="relative">
                    <input id="searchInput" 
                           onkeyup="filterPokemon()"
                           type="text" 
                           placeholder="Search by name, number, or type..." 
                           class="bg-zinc-900 border border-zinc-700 focus:border-emerald-500 rounded-3xl px-6 py-3 w-96 outline-none text-sm">
                </div>
                <select id="regionFilter" onchange="filterPokemon()" 
                        class="bg-zinc-900 border border-zinc-700 rounded-3xl px-6 py-3 outline-none">
                    <option value="">All Regions / Forms</option>
                    <option value="normal">Normal</option>
                    <option value="alola">Alolan</option>
                    <option value="galar">Galarian</option>
                    <option value="hisui">Hisuian</option>
                    <option value="paldea">Paldean</option>
                    <option value="mega">Mega</option>
                    <option value="gmax">Gigantamax</option>
                </select>
            </div>
        </div>

        <!-- Stats Bar -->
        <div class="flex justify-between text-sm mb-6 bg-zinc-900/70 backdrop-blur-md border border-zinc-700 rounded-3xl px-8 py-4">
            <div><span id="totalCount" class="text-emerald-400 font-mono text-xl">0</span> Pokémon • <span id="formCount" class="text-zinc-400">All variants included</span></div>
            <div class="flex gap-6 text-zinc-400">
                <div>Gen 1-9 + All Regional Forms</div>
                <div class="text-emerald-400 cursor-pointer hover:underline" onclick="loadAllPokemon()">Refresh Database</div>
            </div>
        </div>

        <!-- Pokédex Grid -->
        <div id="pokedexGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 2xl:grid-cols-6 gap-6">
            <!-- Populated by JS -->
        </div>
    </div>

    <!-- Pokemon Detail Modal -->
    <div id="detailModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50">
        <div class="bg-zinc-900 border border-zinc-700 rounded-3xl max-w-2xl w-full mx-4 max-h-[90vh] overflow-hidden">
            <div class="p-8 relative" id="modalContent">
                <!-- Filled by JS -->
            </div>
        </div>
    </div>

    <script>
        let allPokemon = [];
        let currentFilter = "";

        async function fetchPokemonList() {
            const grid = document.getElementById('pokedexGrid');
            grid.innerHTML = `<div class="col-span-full text-center py-12 text-emerald-400">Loading full Pokédex with all forms... (this may take ~15-20 seconds on first load)</div>`;
            
            try {
                // Get ALL pokemon (including forms)
                const res = await fetch('https://pokeapi.co/api/v2/pokemon?limit=2000');
                const data = await res.json();
                
                const promises = data.results.map(async (p) => {
                    try {
                        const detailRes = await fetch(p.url);
                        const detail = await detailRes.json();
                        
                        // Get species for forms info
                        let speciesData = null;
                        try {
                            const speciesRes = await fetch(detail.species.url);
                            speciesData = await speciesRes.json();
                        } catch(e) {}
                        
                        return {
                            id: detail.id,
                            name: detail.name,
                            types: detail.types.map(t => t.type.name),
                            sprite: detail.sprites.other['official-artwork'].front_default || detail.sprites.front_default,
                            height: detail.height,
                            weight: detail.weight,
                            forms: speciesData ? speciesData.varieties.length : 1,
                            isRegional: detail.name.includes('-') ? 'variant' : 'normal'
                        };
                    } catch(e) {
                        return null;
                    }
                });

                const results = await Promise.all(promises);
                allPokemon = results.filter(p => p !== null);
                
                document.getElementById('totalCount').textContent = allPokemon.length;
                renderPokemon(allPokemon);
                
            } catch(err) {
                grid.innerHTML = `<div class="col-span-full text-center py-12 text-red-400">Error loading Pokédex. Please check your connection.</div>`;
            }
        }

        function renderPokemon(pokemonList) {
            const grid = document.getElementById('pokedexGrid');
            grid.innerHTML = '';
            
            pokemonList.forEach(poke => {
                const card = document.createElement('div');
                card.className = `pokemon-card bg-zinc-900/80 border border-zinc-700 rounded-3xl p-5 cursor-pointer overflow-hidden`;
                
                const typeHTML = poke.types.map(type => 
                    `<span class="inline-block px-3 py-0.5 text-xs rounded-full bg-zinc-800 text-white capitalize">${type}</span>`
                ).join('');
                
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <div class="font-mono text-4xl text-zinc-600">#${poke.id.toString().padStart(3, '0')}</div>
                        ${poke.name.includes('-') ? `<div class="form-badge">FORM</div>` : ''}
                    </div>
                    <div class="h-40 flex items-center justify-center text-8xl mb-4">
                        <img src="${poke.sprite}" alt="${poke.name}" class="max-h-40 drop-shadow-2xl">
                    </div>
                    <div class="title-font text-2xl capitalize mb-1">${poke.name.replace(/-/g, ' ')}</div>
                    <div class="flex gap-2">${typeHTML}</div>
                `;
                
                card.onclick = () => showDetail(poke);
                grid.appendChild(card);
            });
        }

        async function showDetail(poke) {
            const modal = document.getElementById('detailModal');
            const content = document.getElementById('modalContent');
            
            // Fetch more detailed data
            const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${poke.id}`);
            const data = await res.json();
            
            let abilities = data.abilities.map(a => a.ability.name).join(', ');
            
            content.innerHTML = `
                <button onclick="closeModal()" class="absolute top-6 right-6 text-3xl text-zinc-500 hover:text-white">×</button>
                
                <div class="flex gap-8">
                    <div class="flex-1">
                        <div class="font-mono text-6xl text-zinc-700 mb-2">#${data.id.toString().padStart(3,'0')}</div>
                        <div class="title-font text-5xl capitalize mb-6">${data.name.replace(/-/g, ' ')}</div>
                        
                        <div class="flex gap-3 mb-8">
                            ${data.types.map(t => `
                                <div class="px-6 py-2 bg-zinc-800 rounded-2xl capitalize text-lg">${t.type.name}</div>
                            `).join('')}
                        </div>
                        
                        <img src="${data.sprites.other['official-artwork'].front_default || data.sprites.front_default}" 
                             class="w-full max-h-80 object-contain drop-shadow-2xl" alt="${data.name}">
                    </div>
                    
                    <div class="flex-1 space-y-6 pt-12">
                        <div>
                            <div class="uppercase text-xs tracking-widest text-emerald-400 mb-2">Base Stats</div>
                            <div class="grid grid-cols-2 gap-x-8 gap-y-3 text-sm">
                                ${data.stats.map(stat => `
                                    <div class="flex justify-between">
                                        <span class="capitalize">${stat.stat.name}</span>
                                        <span class="font-mono">${stat.base_stat}</span>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                        
                        <div>
                            <div class="uppercase text-xs tracking-widest text-emerald-400 mb-2">Abilities</div>
                            <div class="text-zinc-300">${abilities}</div>
                        </div>
                        
                        <div class="grid grid-cols-2 gap-4 text-sm">
                            <div>Height: <span class="font-mono">${data.height/10} m</span></div>
                            <div>Weight: <span class="font-mono">${data.weight/10} kg</span></div>
                        </div>
                        
                        <button onclick="alert('Solo tips for this Pokémon coming in next update!')" 
                                class="w-full bg-emerald-600 hover:bg-emerald-500 py-4 rounded-2xl font-medium">
                            Get Solo Play Tips
                        </button>
                    </div>
                </div>
            `;
            
            modal.classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('detailModal').classList.add('hidden');
        }

        function filterPokemon() {
            const search = document.getElementById('searchInput').value.toLowerCase().trim();
            const region = document.getElementById('regionFilter').value;
            
            let filtered = allPokemon;
            
            if (search) {
                filtered = filtered.filter(p => 
                    p.name.toLowerCase().includes(search) || 
                    p.id.toString().includes(search)
                );
            }
            
            if (region) {
                if (region === 'normal') {
                    filtered = filtered.filter(p => !p.name.includes('-'));
                } else {
                    filtered = filtered.filter(p => p.name.includes(region));
                }
            }
            
            renderPokemon(filtered);
        }

        function loadAllPokemon() {
            fetchPokemonList();
        }

        // Initialize
        window.onload = () => {
            fetchPokemonList();
            
            // Keyboard shortcut for search
            document.addEventListener('keydown', e => {
                if (e.key === '/' && document.getElementById('searchInput') !== document.activeElement) {
                    e.preventDefault();
                    document.getElementById('searchInput').focus();
                }
            });
        };
    </script>
</body>
</html>
